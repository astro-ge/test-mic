<!DOCTYPE html>
<html>
<head>
    <title>Mic Test - Coach Vallas</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 40px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; margin: 10px; }
        #status { margin-top: 20px; font-size: 16px; color: #333; }
    </style>
</head>
<body>
    <h2>Microphone Permission Test</h2>
    <p>Click the button to test if microphone works inside iframe</p>
    <button id="micBtn">Request Microphone</button>
    <div id="status">Status: waiting...</div>

    <script>
        document.getElementById('micBtn').addEventListener('click', async () => {
            const status = document.getElementById('status');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                status.textContent = 'Status: Microphone ACCESS GRANTED';
                status.style.color = 'green';
                stream.getTracks().forEach(t => t.stop());
            } catch (e) {
                status.textContent = 'Status: Microphone DENIED - ' + e.message;
                status.style.color = 'red';
            }
        });
    </script>
</body>
</html>
